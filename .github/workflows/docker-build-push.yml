name: Build and Push Docker Image

on:
  push:
    branches: [develop]  # runs on develop branch
    paths:
      - 'backend/**'  

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run unit tests
        working-directory: ./backend
        run: npm test
        continue-on-error: true

      - name: Run dependency vulnerability scan
        working-directory: ./backend
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        working-directory: ./backend
        run: docker compose build backend 

      - name: Tag Docker image
        working-directory: ./backend
        run: |
          docker tag backend-backend:latest rawan36/dana_backend:latest
          docker tag backend-backend:latest rawan36/dana_backend:${{ github.sha }}

      - name: Push Docker image
        run: |
          docker push rawan36/dana_backend:latest
          docker push rawan36/dana_backend:${{ github.sha }}

      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rawan36/dana_backend:latest
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Logout from DockerHub
        if: always()
        run: docker logout

      - name: Send failure notification email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ Pipeline Failed: ${{ github.repository }} - ${{ github.ref_name }}"
          to: rawanrawan1912@gmail.com
          from: GitHub Actions
          body: |
            Pipeline failed for repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Commit Message: ${{ github.event.head_commit.message }}
            Author: ${{ github.actor }}
            
            Workflow: ${{ github.workflow }}
            Run Number: ${{ github.run_number }}
            
            View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
